services:


  php:
    build: . 

    ports:
      - "8080:80" 

    volumes:
      - .:/var/www/html 

    environment:

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: ${APP_ENV}

    depends_on:
      - mysql 


  mysql:
    image: mysql:8.0 

    environment:
      
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME} 

    ports:
      - "3311:3306" 

    volumes:
      - db_data:/var/lib/mysql 

volumes:
  db_data: