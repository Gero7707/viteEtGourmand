# Point d'entrée principal du serveur virtuel Apache
# Écoute sur le port 80 (HTTP)
<VirtualHost *:80>

    # Dossier racine publique — seul ce dossier est accessible depuis le navigateur
    # index.php s'y trouve et sert de point d'entrée unique (pattern Front Controller)
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # Permet l'utilisation de .htaccess pour la réécriture d'URL (mod_rewrite)
        AllowOverride All
        # Autorise toutes les requêtes entrantes
        Require all granted
    </Directory>

    # ============================================================
    # HEADERS DE SÉCURITÉ HTTP
    # Envoyés par Apache à chaque réponse pour instruire le navigateur
    # "always" garantit l'envoi même en cas d'erreur (404, 500...)
    # ============================================================

    # Empêche l'intégration du site dans un <iframe> — protection contre le clickjacking
    Header always set X-Frame-Options "DENY"

    # Empêche le navigateur de deviner le type MIME d'un fichier
    # Protection contre des fichiers uploadés interprétés comme du JavaScript
    Header always set X-Content-Type-Options "nosniff"

    # Définit les sources autorisées pour les scripts, styles, images etc.
    # 'self' = uniquement depuis ce domaine — bloque les ressources externes non déclarées
    Header always set Content-Security-Policy "default-src 'self'"

    # Contrôle les informations envoyées dans l'en-tête Referer lors de la navigation
    # strict-origin-when-cross-origin = envoie l'origine complète en interne,
    # uniquement l'origine (sans chemin) vers des sites externes en HTTPS
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Désactive explicitement l'accès aux APIs sensibles du navigateur
    # Aucune page du site ne pourra demander géolocalisation, micro ou caméra
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

</VirtualHost>